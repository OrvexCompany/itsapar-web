<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - ITSapar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="policyWrapper" style="display: none;"></div>

    <div class="container">
        <div class="card">
            <div class="logo" style="text-align: center; font-size: 2rem;">✈️ ITSapar</div>
            <h2 style="text-align: center; margin-bottom: 30px;" data-i18n="register_title"></h2>

            <form id="registerForm">
                <div class="form-group">
                    <label for="regUsername" data-i18n="username_label"></label>
                    <input type="text" id="regUsername" data-i18n-placeholder="username_label" required>
                </div>
                <div class="form-group">
                    <label for="regPassword" data-i18n="password_label"></label>
                    <input type="password" id="regPassword" data-i18n-placeholder="password_label" required>
                </div>
                
                <div id="regError" class="error-text" style="display: none; margin-bottom: 15px;">
                    Этот логин уже занят. Попробуйте другой.
                </div>

                <button type="submit" class="btn btn-primary full-width" data-i18n="register_button"></button>

                <div style="text-align: center; margin-top: 20px;">
                    <span style="font-size: 0.9rem; color: #64748b;" data-i18n="already_have_account"></span>
                    <a href="login.html" class="btn-outline" style="border: none; font-size: 0.9rem; padding: 5px; text-transform: none; text-decoration: underline;" data-i18n="login_link_text"></a>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
