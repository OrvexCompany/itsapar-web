<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анкета - ITSapar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card form-card">
            <h2 data-i18n="form_title"></h2>
            <form id="userForm">
                <div class="form-group">
                    <label data-i18n="full_name_label"></label>
                    <input type="text" id="fullName" data-i18n-placeholder="full_name_label" required>
                </div>
                <div class="form-group">
                    <label data-i18n="age_label"></label>
                    <input type="number" id="age" data-i18n-placeholder="age_label" required>
                </div>
                <div class="form-group">
                    <label>Бюджет (₸)</label>
                    <select id="budget">
                        <option value="low">до 50 000</option>
                        <option value="medium">50 000 - 200 000</option>
                        <option value="high">от 200 000</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Тип поездки</label>
                    <select id="tripType">
                        <option value="solo">Одиночная</option>
                        <option value="family">Семейная</option>
                        <option value="friends">С друзьями</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary full-width">Далее</button>
            </form>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
