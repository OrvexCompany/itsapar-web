<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анкета - ITSapar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card form-card">
            <h2 data-i18n="form_title"></h2>
            <form id="userForm">
                <div class="form-group">
                    <label data-i18n="full_name_label"></label>
                    <input type="text" id="fullName" data-i18n-placeholder="full_name_label" required>
                </div>
                <div class="form-group">
                    <label data-i18n="age_label"></label>
                    <input type="number" id="age" data-i18n-placeholder="age_label" required>
                </div>
                <div class="form-group">
                    <label data-i18n="form_budget_label"></label>
                    <select id="budget">
                        <option value="low" data-i18n="budget_low"></option>
                        <option value="medium" data-i18n="budget_medium"></option>
                        <option value="high" data-i18n="budget_high"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label data-i18n="form_trip_type_label"></label>
                    <select id="tripType">
                        <option value="solo" data-i18n="form_trip_solo"></option>
                        <option value="family" data-i18n="form_trip_family"></option>
                        <option value="friends" data-i18n="form_trip_friends"></option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary full-width" data-i18n="next_button"></button>
            </form>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
