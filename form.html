<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анкета - ITSapar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card form-card">
            <h2>Расскажите о себе</h2>
            <form id="userForm">
                <div class="form-group">
                    <label>Ваше полное имя</label>
                    <input type="text" id="fullName" placeholder="Иван Иванов" required>
                </div>
                <div class="form-group">
                    <label>Возраст</label>
                    <input type="number" id="age" placeholder="Например, 25" required>
                </div>
                <div class="form-group">
                    <label>Бюджет на поездку</label>
                    <select id="budget">
                        <option value="low">До 50 000 ₸</option>
                        <option value="medium">50 000 - 200 000 ₸</option>
                        <option value="high">Более 200 000 ₸</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Тип поездки</label>
                    <select id="tripType">
                        <option value="solo">Одиночная</option>
                        <option value="family">Семейная</option>
                        <option value="friends">С друзьями</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary full-width">Продолжить</button>
            </form>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
