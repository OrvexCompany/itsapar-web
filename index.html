<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITSapar - Начни свое путешествие</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Контейнер для политики будет вставлен автоматически через JS -->
    <div id="policyWrapper"></div>

    <div class="container hero">
        <header> 
            <div class="logo">✈️ <span data-i18n="app_name"></span> <span>(Orvex)</span></div>
        </header>

        <main class="content-center">
            <div class="travel-icons">🚀 🚂 🚗 🚢</div>
            <h1 data-i18n="app_slogan"></h1>
            <p style="font-size: 1.2rem; color: #475569; margin-bottom: 2rem;" data-i18n="app_description"></p>

            <div class="button-group">
                <a href="register.html" class="btn btn-primary" data-i18n="start_registration"></a>
                <a href="login.html" class="btn btn-outline" data-i18n="login"></a>
            </div>
        </main>
    </div>

    <style>
        .travel-icons { font-size: 2rem; margin-bottom: 1rem; letter-spacing: 15px; opacity: 0.8; }
    </style>

    <!-- 🔥 ВОТ СЮДА ДОБАВЛЯЕМ -->
    <script src="app.js"></script>
</body>
</html>
