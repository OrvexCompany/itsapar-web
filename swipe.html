<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ваши интересы - ITSapar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="swipe-container hero">
            <p style="text-transform: uppercase; font-weight: 800; font-size: 0.8rem; color: var(--primary); margin-bottom: 10px;">Настройка маршрута</p>
            <div class="progress-bar"><div id="progress" style="width: 20%;"></div></div>
            <div id="swipeCard" class="card swipe-card">
                <h3 id="questionTitle">Загрузка...</h3>
                <p id="questionDesc">Подождите немного...</p>
            </div>
            <div class="swipe-buttons">
                <button onclick="handleSwipe(false)" class="btn btn-no">Нет</button>
                <button onclick="handleSwipe(true)" class="btn btn-yes">Да</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
