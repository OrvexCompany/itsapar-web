<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - ITSapar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="policyWrapper"></div>

    <div class="container">
        <div class="card login-card">
            <h2>Вход в панель</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Логин</label>
                    <input type="text" id="username" required placeholder="Введите логин">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="password" required placeholder="Введите пароль">
                </div>
                <button type="submit" class="btn btn-primary full-width">Войти</button>
                <p id="loginError" class="error-text" style="display:none;">Неверный логин или пароль</p>
                <p class="center-margin">Нет аккаунта? <a href="register.html" style="color:var(--primary); font-weight:bold;">Создать</a></p>
            </form>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
