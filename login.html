<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - ITSapar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="policyWrapper"></div>

    <div class="container">
        <div class="card login-card">
            <h2 data-i18n="login_panel_title"></h2>
            <form id="loginForm">
                <div class="form-group">
                    <label data-i18n="username_label"></label>
                    <input type="text" id="username" required data-i18n-placeholder="username_label">
                </div>
                <div class="form-group">
                    <label data-i18n="password_label"></label>
                    <input type="password" id="password" required data-i18n-placeholder="password_label">
                </div>
                <button type="submit" class="btn btn-primary full-width" data-i18n="login_button"></button>
                <p id="loginError" class="error-text" style="display:none;" data-i18n="login_error"></p>
                <p class="center-margin"><span data-i18n="no_account"></span> <a href="register.html" data-i18n="create_acc_link" style="color:var(--primary); font-weight:bold;"></a></p>
            </form>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
