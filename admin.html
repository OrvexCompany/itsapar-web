<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ панель - ITSapar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container admin-container">
        <div class="admin-header">
            <div>
                <h2 style="margin-bottom: 10px;">Пользователи системы</h2>
                <input type="text" id="adminSearch" placeholder="Поиск по имени или логину..." style="padding: 12px; border-radius: 12px; border: 1px solid #cbd5e1; width: 300px; font-size: 0.9rem;">
            </div>
            <button onclick="navigateWithTransition('admin-analytics.html')" class="btn btn-primary" style="margin-right: 15px;">📊 Аналитика</button>
            <button onclick="logout()" class="btn btn-outline">Выйти</button>
        </div>
        <table class="admin-table">
            <thead>
                <tr>
                    <th>ФИО (Логин)</th>
                    <th>Возраст</th>
                    <th>Бюджет</th>
                    <th>Тип</th>
                    <th>Интересы</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="adminTableBody"></tbody>
        </table>
    </div>
    <script src="app.js"></script>
</body>
</html>
