<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ аналитика - ITSapar</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .stats-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--white); padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 4px 6px var(--shadow); }
        .stat-card h4 { margin: 0; color: var(--text); opacity: 0.7; font-size: 0.9rem; }
        .stat-card p { margin: 10px 0 0; font-size: 1.8rem; font-weight: 800; color: var(--primary); }
        .charts-container { display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px; margin-bottom: 40px; }
        .chart-box { background: var(--white); padding: 20px; border-radius: 24px; box-shadow: 0 10px 25px var(--shadow); }
        
        /* Адаптивность для мобильных устройств */
        @media (max-width: 768px) {
            .stats-cards { grid-template-columns: 1fr; }
            .charts-container { grid-template-columns: 1fr; }
            .admin-header { flex-direction: column; text-align: center; gap: 15px; }
        }
        canvas { max-width: 100%; }
        .error-container { text-align: center; padding: 50px; background: var(--white); border-radius: 24px; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="analyticsContainer" class="container" style="max-width: 1000px;">
        <div class="admin-header">
            <h1 data-i18n="admin_analytics_title"></h1>
            <button onclick="navigateWithTransition('admin.html')" class="btn btn-outline" data-i18n="admin_analytics_back_button"></button>
        </div>

        <!-- Общая статистика -->
        <div class="stats-cards">
            <div class="stat-card">
                <h4 data-i18n="admin_analytics_total_users"></h4>
                <p id="totalUsers">-</p>
            </div>
            <div class="stat-card clickable-card" id="budgetCard">
                <h4 data-i18n="admin_analytics_avg_budget"></h4>
                <p id="avgBudget">- ₸</p>
            </div>
        </div>

        <!-- Графики -->
        <div class="charts-container">
            <div class="chart-box"> <!-- data-i18n="admin_analytics_interests_chart" -->
                <h4 style="text-align: center; margin-bottom: 15px;" data-i18n="admin_analytics_interests_chart"></h4>
                <canvas id="interestsChart"></canvas>
            </div>
            <div class="chart-box"> <!-- data-i18n="admin_analytics_cities_chart" -->
                <h4 style="text-align: center; margin-bottom: 15px;" data-i18n="admin_analytics_cities_chart"></h4>
                <canvas id="citiesChart"></canvas>
            </div>
        </div>

        <!-- Таблица -->
        <div class="card" style="padding: 20px;">
            <h3 style="margin-bottom: 20px;">Список активных анкет</h3>
            <table class="admin-table"> <!-- data-i18n="admin_analytics_active_surveys" -->
                <thead> 
                    <tr>
                        <th data-i18n="admin_table_fio_login"></th>
                        <th data-i18n="admin_table_age"></th>
                        <th data-i18n="admin_table_budget"></th>
                    </tr>
                </thead>
                <tbody id="analyticsTableBody"><tr><td colspan="3" style="text-align:center;">Загрузка данных...</td></tr></tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadAnalytics() {
            const token = localStorage.getItem('token');
            const isAdmin = localStorage.getItem('isAdmin') === 'true';
            
            if (!token || !isAdmin) {
                window.location.href = 'login.html';
                return;
            }

            const container = document.getElementById('analyticsContainer');
            const originalContent = container.innerHTML;

            try {
                // Исползуем относительный путь вместо localhost
                const response = await fetch('/admin/analytics', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error(response.status === 403 ? 'Доступ запрещен' : 'Ошибка сервера');
                const data = await response.json();

                const totalUsersEl = document.getElementById('totalUsers');
                const avgBudgetEl = document.getElementById('avgBudget');
                
                if (!totalUsersEl || !avgBudgetEl) return;

                // Наполнение цифр
                totalUsersEl.innerText = data.totalUsers;
                avgBudgetEl.innerText = data.averageBudget.toLocaleString() + ' ₸';

                // Таблица
                const tableBody = document.getElementById('analyticsTableBody');
                tableBody.innerHTML = data.usersList.map(u => `
                    <tr>
                        <td>${u.fullName || translations[currentLang].admin_table_not_filled}</td>
                        <td>${u.age} ${translations[currentLang].admin_table_age_years}</td>
                        <td>${u.budget === 'low' ? translations[currentLang].admin_table_budget_low_short : u.budget === 'medium' ? translations[currentLang].admin_table_budget_medium_short : translations[currentLang].admin_table_budget_high_short}</td>
                    </tr>
                `).join('');

                // График Интересов (Pie)
                new Chart(document.getElementById('interestsChart'), {
                    type: 'pie',
                    data: {
                        labels: [translations[currentLang].chat_option_mountains, translations[currentLang].chat_option_sea, translations[currentLang].chat_option_city, translations[currentLang].chat_option_activity, translations[currentLang].chat_option_culture, translations[currentLang].gastronomy, translations[currentLang].seclusion, translations[currentLang].shopping, translations[currentLang].family_fun, translations[currentLang].eco_tourism],
                        datasets: [{
                            data: Object.values(data.interestsStats),
                            backgroundColor: ['#4f46e5', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#64748b', '#f97316', '#3b82f6', '#22c55e']
                        }]
                    }
                });

                // График Городов (Bar)
                const cityLabels = Object.keys(data.topCities);
                const cityValues = Object.values(data.topCities);
                
                new Chart(document.getElementById('citiesChart'), {
                    type: 'bar',
                    data: {
                        labels: cityLabels,
                        datasets: [{
                            label: translations[currentLang].admin_table_recommendations_count,
                            data: cityValues,
                            backgroundColor: 'rgba(79, 70, 229, 0.7)',
                            borderColor: '#4f46e5',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                    }
                });

                // Привязываем функцию показа формулы к карточке
                document.getElementById('budgetCard').onclick = showBudgetFormula;

            } catch (error) {
                console.error("Analytics Error:", error);
                container.innerHTML = `
                    <div class="error-container">
                        <h2 style="color:var(--danger)">⚠️ ${translations[currentLang].admin_analytics_error_server}</h2>
                        <p>${translations[currentLang].admin_analytics_error_server}</p>
                        <button onclick="location.reload()" class="btn btn-primary" style="margin-top:20px;">${translations[currentLang].admin_analytics_reload_data}</button>
                        <button onclick="navigateWithTransition('admin.html')" class="btn btn-outline" style="margin-top:20px;">${translations[currentLang].admin_analytics_back_button}</button>
                    </div>
                `;
            }
        }

        function showBudgetFormula() {
            const modal = document.createElement('div');
            modal.id = 'formulaModal';
            modal.className = 'modal-overlay';
            modal.innerHTML = ` <!-- This content needs to be translated -->
                <div class="card modal-card">
                    <h3 style="margin-bottom:15px;" data-i18n="budget_formula_title"></h3>
                    <div class="policy-text">
                        <p data-i18n="budget_formula_desc1"></p>
                        <ul style="margin: 15px 0;">
                            <li data-i18n="budget_formula_low"></li>
                            <li data-i18n="budget_formula_medium"></li>
                            <li data-i18n="budget_formula_high"></li>
                        </ul>
                        <div style="background: var(--bg-light); padding: 15px; border-radius: 16px; font-size: 0.85rem; border: 1px dashed var(--primary);">
                            <span data-i18n="budget_formula_formula"></span>
                        </div>
                    </div>
                    <button onclick="document.getElementById('formulaModal').remove()" class="btn btn-primary full-width" data-i18n="budget_formula_understand"></button>
                </div>
            `;
            document.body.appendChild(modal);
        }

        document.addEventListener('DOMContentLoaded', loadAnalytics);
    </script>
    <script src="app.js"></script>
</body>
</html>
