<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ аналитика - ITSapar</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .stats-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--white); padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 4px 6px var(--shadow); }
        .stat-card h4 { margin: 0; color: var(--text); opacity: 0.7; font-size: 0.9rem; }
        .stat-card p { margin: 10px 0 0; font-size: 1.8rem; font-weight: 800; color: var(--primary); }
        .charts-container { display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px; margin-bottom: 40px; }
        .chart-box { background: var(--white); padding: 20px; border-radius: 24px; box-shadow: 0 10px 25px var(--shadow); }
        
        /* Адаптивность для мобильных устройств */
        @media (max-width: 768px) {
            .stats-cards { grid-template-columns: 1fr; }
            .charts-container { grid-template-columns: 1fr; }
            .admin-header { flex-direction: column; text-align: center; gap: 15px; }
        }
        canvas { max-width: 100%; }
        .error-container { text-align: center; padding: 50px; background: var(--white); border-radius: 24px; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="analyticsContainer" class="container" style="max-width: 1000px;">
        <div class="admin-header">
            <h1>📈 Админ аналитика</h1>
            <button onclick="navigateWithTransition('admin.html')" class="btn btn-outline">Назад в панель</button>
        </div>

        <!-- Общая статистика -->
        <div class="stats-cards">
            <div class="stat-card">
                <h4>Всего пользователей</h4>
                <p id="totalUsers">-</p>
            </div>
            <div class="stat-card clickable-card" id="budgetCard">
                <h4>Средний бюджет</h4>
                <p id="avgBudget">- ₸</p>
            </div>
        </div>

        <!-- Графики -->
        <div class="charts-container">
            <div class="chart-box">
                <h4 style="text-align: center; margin-bottom: 15px;">Интересы пользователей</h4>
                <canvas id="interestsChart"></canvas>
            </div>
            <div class="chart-box">
                <h4 style="text-align: center; margin-bottom: 15px;">Популярные города (Топ)</h4>
                <canvas id="citiesChart"></canvas>
            </div>
        </div>

        <!-- Таблица -->
        <div class="card" style="padding: 20px;">
            <h3 style="margin-bottom: 20px;">Список активных анкет</h3>
            <table class="admin-table">
                <thead> 
                    <tr>
                        <th>ФИО (Логин)</th>
                        <th>Возраст</th>
                        <th>Бюджет</th>
                    </tr>
                </thead>
                <tbody id="analyticsTableBody"><tr><td colspan="3" style="text-align:center;">Загрузка данных...</td></tr></tbody>
            </table>
        </div>
    </div>

    <!-- Сначала подключаем app.js, чтобы currentLang и translations были доступны -->
    <script src="app.js"></script>

    <script>
        async function loadAnalytics() {
            const token = localStorage.getItem('token');
            // Более жесткая проверка админа
            const isAdmin = localStorage.getItem('isAdmin') === 'true' || 
                           (token && JSON.parse(atob(token.split('.')[1])).role === 'admin');
            
            if (!token || !isAdmin) {
                console.error("Access Denied: Not an admin");
                window.location.href = 'login.html';
                return;
            }
            
            const container = document.getElementById('analyticsContainer');

            try {
                // Исползуем относительный путь вместо localhost
                const response = await fetch('/admin/analytics', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error(response.status === 403 ? 'Доступ запрещен' : 'Ошибка сервера');
                const data = await response.json();

                const totalUsersEl = document.getElementById('totalUsers');
                const avgBudgetEl = document.getElementById('avgBudget'); // Исправлено: объявление переменной
                
                if (!totalUsersEl || !avgBudgetEl) return;

                // Наполнение цифр
                totalUsersEl.innerText = data.totalUsers; // Hardcoded Russian string
                avgBudgetEl.innerText = data.averageBudget.toLocaleString() + ' ₸'; // Hardcoded Russian string

                // Таблица
                const tableBody = document.getElementById('analyticsTableBody');
                tableBody.innerHTML = data.usersList.map(u => `
                    <tr>
                        <td>${u.fullName || '<i>Анкета не заполнена</i>'}</td>
                        <td>${u.age || '-'} лет</td>
                        <td>${u.budget === 'low' ? 'до 50к' : u.budget === 'medium' ? '50к-200к' : u.budget === 'high' ? 'от 200к' : '-'}</td>
                    </tr>
                `).join('');

                // График Интересов (Pie)
                new Chart(document.getElementById('interestsChart'), {
                    type: 'pie',
                    data: {
                        labels: ['Горы', 'Море', 'Город', 'Активность', 'Культура', 'Гастрономия', 'Уединение', 'Шоппинг', 'Семья', 'Эко-туризм'],
                        datasets: [{
                            data: Object.values(data.interestsStats),
                            backgroundColor: ['#4f46e5', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#64748b', '#f97316', '#3b82f6', '#22c55e']
                        }]
                    }
                });

                // График Городов (Bar)
                const cityLabels = Object.keys(data.topCities);
                const cityValues = Object.values(data.topCities);
                
                new Chart(document.getElementById('citiesChart'), {
                    type: 'bar',
                    data: {
                        labels: cityLabels,
                        datasets: [{
                            label: 'Кол-во рекомендаций',
                            data: cityValues,
                            backgroundColor: 'rgba(79, 70, 229, 0.7)',
                            borderColor: '#4f46e5',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
                    }
                });

                // Привязываем функцию показа формулы к карточке
                document.getElementById('budgetCard').onclick = showBudgetFormula;

            } catch (error) {
                console.error("Analytics Error:", error);
                container.innerHTML = `
                    <div class="error-container">
                        <h2 style="color:var(--danger)">⚠️ Ошибка сервера (500)</h2>
                        <p>Произошла ошибка при загрузке аналитики.</p>
                        <button onclick="location.reload()" class="btn btn-primary" style="margin-top:20px;">Перезагрузить данные</button>
                        <button onclick="navigateWithTransition('admin.html')" class="btn btn-outline" style="margin-top:20px;">Назад в панель</button>
                    </div>
                `;
            }
        }

        function showBudgetFormula() {
            const modal = document.createElement('div');
            modal.id = 'formulaModal';
            modal.className = 'modal-overlay';
            modal.innerHTML = ` <!-- This content needs to be translated -->
                <div class="card modal-card">
                    <h3 style="margin-bottom:15px;">🧮 Как считается бюджет?</h3>
                    <div class="policy-text">
                        <p>Поскольку пользователи выбирают диапазон, мы присваиваем каждой категории числовой вес:</p>
                        <ul style="margin: 15px 0;">
                            <li><strong>"До 50 000 ₸":</strong> 50,000 ₸</li>
                            <li><strong>"50 000 - 200 000 ₸":</strong> 125,000 ₸</li>
                            <li><strong>"От 200 000 ₸":</strong> 250,000 ₸</li>
                        </ul>
                        <div style="background: var(--bg-light); padding: 15px; border-radius: 16px; font-size: 0.85rem; border: 1px dashed var(--primary);">
                            <strong>Формула:</strong><br>(Сумма всех весов) ÷ (Кол-во заполненных анкет)
                        </div>
                    </div>
                    <button onclick="document.getElementById('formulaModal').remove()" class="btn btn-primary full-width">Понятно</button>
                </div>
            `;
            document.body.appendChild(modal);
        }

        // Ждем, пока app.js выставит язык, затем грузим данные
        window.addEventListener('load', loadAnalytics);
    </script>
</body>
</html>
