<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ваш результат - ITSapar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="results-columns">
            <!-- Колонка 1: Персональные рекомендации -->
            <div class="results-column">
                <h2 class="column-title" data-i18n="results_ideal_header"></h2>
                <div id="resultsList" class="results-grid"></div>
            </div>

            <!-- Колонка 2: Глобальная популярность -->
            <div class="results-column">
                <h2 class="column-title" data-i18n="results_popular_header"></h2>
                <div id="popularList" class="results-grid"></div>
            </div>
        </div>

        <div class="all-cities-toggle-section">
            <button id="showAllCitiesBtn" class="btn btn-outline" data-i18n="show_all_cities"></button>
            <div id="allCitiesContainer" style="display: none;">
                <h3 data-i18n="all_cities_title"></h3>
                <ul id="allCitiesList" class="simple-city-list">
                    <!-- All cities will be rendered here by JS -->
                </ul>
                <p class="all-cities-disclaimer" data-i18n="all_cities_disclaimer"></p>
            </div>
        </div>

        <div class="center-margin">
            <button id="retakeBtn" class="btn btn-primary" data-i18n="retake_btn"></button>
            <a href="index.html" class="btn btn-outline" data-i18n="home_btn"></a>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
